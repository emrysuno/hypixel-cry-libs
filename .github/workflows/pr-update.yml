name: Auto-Update Library Registry

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

jobs:
  process-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout Your Repository (Main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate and Prepare Registry
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:temp_pr
          
          ALL_FILES=$(git diff --name-only main temp_pr | grep -v 'registry.json' || true)
          LUA_FILES=$(echo "$ALL_FILES" | grep '\.lua$' || true)
          TOTAL_COUNT=$(echo "$ALL_FILES" | grep -v '^$' | wc -l || echo 0)
          LUA_COUNT=$(echo "$LUA_FILES" | grep -v '^$' | wc -l || echo 0)

          if [ "$TOTAL_COUNT" -ne "$LUA_COUNT" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --repo "$REPO" \
               --body "❌ **PR Rejected**: Only `.lua` files are allowed. Please remove other files and try again."
            gh pr close ${{ github.event.pull_request.number }} --repo "$REPO"
            exit 1
          fi

          git checkout temp_pr
          sudo apt-get update && sudo apt-get install -y jq lua5.4

          if [ ! -f "registry.json" ]; then echo "[]" > registry.json; fi
          
          git checkout main -- registry.json || echo "[]" > registry.json

          for FILE in $LUA_FILES; do
            if [ ! -f "$FILE" ]; then continue; fi
            MD5=$(md5sum "$FILE" | awk '{print $1}')
            NAME=$(basename "$FILE")
            VER=$(grep -oP '^--\s*@version\s+\K.*' "$FILE" || echo "alpha-0.1")
            LOC=$(grep -oP '^--\s*@location\s+\K.*' "$FILE" || echo "/libs/")
            
            jq --arg name "$NAME" --arg md5 "$MD5" --arg loc "$LOC" --arg ver "$VER" \
               'map(select(.name != $name)) + [{name: $name, md5: $md5, location: $loc, ver: $ver}]' \
               registry.json > registry.json.tmp && mv registry.json.tmp registry.json
          done
          
          cp registry.json /tmp/registry.json
          
          git checkout main

      - name: Approve and Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --repo ${{ github.repository }}
          gh pr merge ${{ github.event.pull_request.number }} --merge --delete-branch --repo ${{ github.repository }}
          
          git pull origin main

      - name: Update Registry on Main
        run: |
          cp /tmp/registry.json registry.json
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add registry.json
          if git diff --staged --quiet; then
            echo "No changes to registry.json"
          else
            git commit -m "chore: update registry for PR #${{ github.event.pull_request.number }}"
            git push origin main
          fi

      - name: Success Notification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
             --repo ${{ github.repository }} \
             --body "✅ **Success!** Library registered and PR merged into main."
